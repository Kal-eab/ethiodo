databases:
  - name: ethiodo-db
    plan: free
    postgresMajorVersion: 16

services:
  # Backend API — Express + Prisma (see /server)
  - type: web
    name: ethiodo-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ethiodo-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://ethiodo.com,https://www.ethiodo.com,https://ethiodo-frontend.onrender.com
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-opus-4-8
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REFRESH_TOKEN
        sync: false
      - key: GA4_PROPERTY_ID
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_PUBLIC_URL
        sync: false

  # Frontend — static React/Vite build
  - type: web
    name: ethiodo-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://ethiodo-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
